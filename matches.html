<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Винтерфелл — Матчи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="matches.html">
  <div id="site-header"></div>
  <main>
    <section class="hero">
      <div class="container layout-two">
        <div class="reveal">
          <span class="eyebrow">Матчи и результаты</span>
          <h1 class="page-title">Игровой календарь и динамика клуба</h1>
          <p>Здесь собран календарь встреч клуба, ближайшие матчи и результаты уже сыгранных игр, отражающие текущий темп развития команды и её турнирный ритм.</p>
        </div>
        <div class="visual-frame reveal">
          <img src="assets/img/banners/banner-matches.jpg" alt="Игровые формы клуба">
</div>
      </div>
    </section>

    <section class="section compact">
      <div class="container">
        <div class="section-head reveal"><div><span class="eyebrow">Календарь</span><h2 class="section-title">Предстоящие матчи</h2></div></div>
        <div class="match-list" id="matches-upcoming"></div>
      </div>
    </section>

    <section class="section compact">
      <div class="container">
        <div class="section-head reveal"><div><span class="eyebrow">Результаты</span><h2 class="section-title">Прошедшие встречи</h2></div></div>
        <div id="matches-results"></div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="assets/js/app.js"></script>
</body>
</html>
