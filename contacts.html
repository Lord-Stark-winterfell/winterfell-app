<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — Винтерфелл</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            background: #111827;
            padding: 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }

        .banner {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 30px;
            object-fit: cover;
        }

        .contact-info {
            background: #1e293b;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .contact-info h2 {
            margin-bottom: 15px;
        }

        .contact-info p {
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .contact-form {
            background: #1e293b;
            padding: 25px;
            border-radius: 20px;
        }

        .contact-form h2 {
            margin-bottom: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            background: #334155;
            color: white;
            font-size: 16px;
        }

        .contact-form textarea {
            min-height: 150px;
            resize: vertical;
        }

        .contact-form button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .contact-form button:hover {
            background: #1d4ed8;
        }

        footer {
            text-align: center;
            padding: 25px;
            background: #111827;
            margin-top: 50px;
        }

        max-width: 768px {
            .container {
                padding: 15px;
            }

            .contact-form,
            .contact-info {
                padding: 20px;
            }
        }
    </style>
</head>

        <p><strong>Email:</strong> lfcwinterfell@gmail.com</p>
        <p><strong>Telegram:</strong> @Winterfelllfc</p>
    </div>

    <div class="contact-form">
        <h2>Связаться с клубом</h2>

        <form id="contactForm">

            <input type="text" id="name" placeholder="Ваше имя" required>

            <input type="email" id="email" placeholder="Электронная почта" required>

            <input type="text" id="subject" placeholder="Тема сообщения" required>

            <textarea id="message" placeholder="Текст сообщения" required></textarea>

            <button type="submit">Отправить</button>

        </form>
    </div>

</div>

</footer>
